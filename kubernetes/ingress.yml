apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ha-elixir
  namespace: ai-ha-elixir
spec:
  ingressClassName: nginx
  rules:
    # ai.alex-kube.duckdns.org
    - host: $INGRESS_HOST
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-ha-elixir
                port:
                  number: 80
